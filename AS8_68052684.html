<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab8 Sorawich Jantawong</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-sm navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Sorawich Jantawong</a>

        <!-- ปุ่ม toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- เมนู -->
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a href="#" class="nav-link">หน้าแรก</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">บริการ</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">เกี่ยวกับเรา</a>
                </li>
                <!-- 🔥 เปิด Modal -->
                <li class="nav-item">
                    <a href="#" class="nav-link" data-bs-toggle="modal" data-bs-target="#myModal">
                        ติดต่อเรา
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- 🔷 Collapse -->
<div class="container mt-4">
    <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#content">
        แสดงรายละเอียด
    </button>

    <div id="content" class="collapse mt-3">
        <div class="card card-body">
            นี่คือเนื้อหาที่ซ่อนอยู่ (Collapse)
        </div>
    </div>
</div>

<!-- 🔷 Modal -->
<div class="modal fade" id="myModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <!-- Header -->
            <div class="modal-header">
                <h5 class="modal-title">ติดต่อเรา</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <!-- Body -->
            <div class="modal-body">
                <label>เสนอหัวข้องานของคุณ</label>
                <textarea class="form-control" rows="4"></textarea>
            </div>

            <!-- Footer -->
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">ปิด</button>
                <button class="btn btn-primary">ส่งข้อมูล</button>
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
